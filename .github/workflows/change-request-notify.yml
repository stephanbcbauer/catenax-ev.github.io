name: Change Request – Dependency Notification

on:
  issues:
    types: [labeled]

jobs:
  notify:
    # Run only when the "Change Request" label is the one being added.
    # Using github.event.label.name (the label that triggered this event)
    # instead of scanning all labels ensures the job runs exactly once,
    # whether the label is applied at issue creation (via template) or added later.
    if: github.event.label.name == 'Change Request'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Post dependency notification comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // ── 1. Extract the standard identifier from the issue body ──────────
            const issueBody = context.payload.issue.body ?? '';

            // The issue form renders "### Standard\n\nCX-0001: ..." in the body.
            // Use [\r\n]+ to handle both Unix and Windows line endings, and \s*
            // to tolerate any leading whitespace before the value on the next line.
            const standardSection = issueBody.match(/###\s+Standard\s*[\r\n]+\s*([^\r\n]+)/);
            if (!standardSection) {
              console.log('No "Standard" section found in issue body – skipping.');
              return;
            }
            const standardText = standardSection[1].trim();

            // Accept both "CX-0001: Title" and plain "CX-0001"
            const cxMatch = standardText.match(/CX-(\d+)/i);
            if (!cxMatch) {
              console.log(`Could not extract a CX number from: "${standardText}" – skipping.`);
              return;
            }

            // Zero-pad to 4 digits (graph uses "cx0001", owner data uses "0001")
            const standardNumber = cxMatch[1].padStart(4, '0');
            const standardId     = `cx${standardNumber}`;

            // ── 2. Load static data files ────────────────────────────────────────
            const graphData = JSON.parse(
              fs.readFileSync('./static/standards-graph-data.json', 'utf8')
            );
            const ownerData = JSON.parse(
              fs.readFileSync('./static/standard-owners.json', 'utf8')
            );

            const nodesById = Object.fromEntries(
              graphData.nodes.map(n => [n.id, n])
            );

            // ── 3. Check that the standard exists in the graph ───────────────────
            const changedNode = nodesById[standardId];
            if (!changedNode) {
              console.log(`Standard ${standardId} not found in graph data – posting comment.`);
              const cxLabel = `CX-${standardNumber}`;
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `## 🔔 Change Request – Dependency Notification\n\n` +
                      `A change request has been opened for **${cxLabel}**, but this standard was **not found** in the [Catena-X Standards Graph](https://catenax-ev.github.io). ` +
                      `Therefore, no dependency relationships can be reported.\n\n` +
                      `---\n` +
                      `*This comment was generated automatically by the [Change Request – Dependency Notification]` +
                      `(${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/change-request-notify.yml) workflow.*`,
              });
              return;
            }

            // ── 4. Find all related standards (both edge directions) ─────────────
            //   source → target  means "source references / depends on target"
            const dependsOnIds   = new Set(); // changed standard depends on these
            const dependentIds   = new Set(); // these depend on the changed standard

            for (const edge of graphData.edges) {
              if (edge.source === standardId) dependsOnIds.add(edge.target);
              if (edge.target === standardId) dependentIds.add(edge.source);
            }

            // Helper: look up committee + expert-group info for a CX node id
            function getOwnerInfo(nodeId) {
              const node = nodesById[nodeId];
              if (!node) return null;
              const num      = node.number;           // e.g. "0001"
              const stdOwner = ownerData.standards[num];
              if (!stdOwner) return { node, committeeId: null, committee: null, expertGroupId: null, expertGroup: null };

              const committeeId  = stdOwner.committeeId  ?? null;
              const expertGroupId = stdOwner.expertGroupId ?? null;
              const committee    = committeeId  ? ownerData.committees[committeeId]   ?? null : null;
              const expertGroup  = expertGroupId ? ownerData.expertGroups[expertGroupId] ?? null : null;

              return { node, committeeId, committee, expertGroupId, expertGroup };
            }

            // Helper: derive the GitHub @org/team mention from a team URL, falling back to the id
            function teamMention(id, teamObj) {
              if (!id) return null;
              // URL format: https://github.com/orgs/<org>/teams/<slug>
              const urlMatch = teamObj?.url?.match(/orgs\/([^/]+)\/teams\/([^/]+)/);
              if (urlMatch) return `@${urlMatch[1]}/${urlMatch[2]}`;
              // Fallback: assume the catenax-eV org and use the id as the slug
              return `@catenax-eV/${id}`;
            }

            // Helper: format a single standard row for the comment table
            function formatRow(nodeId) {
              const info = getOwnerInfo(nodeId);
              if (!info) return null;
              const { node, committeeId, committee, expertGroupId, expertGroup } = info;
              const cxId    = `CX-${node.number}`;
              const title   = node.title ?? '—';
              const path    = node.path
                ? `https://catenax-ev.github.io${node.path}`
                : null;
              const stdLink = path ? `[${cxId}: ${title}](${path})` : `${cxId}: ${title}`;

              const committeeMention = teamMention(committeeId, committee);
              const committeeStr = committee
                ? (committee.url
                    ? `[${committee.label}](${committee.url})${committeeMention ? ` (${committeeMention})` : ''}`
                    : `${committee.label}${committeeMention ? ` (${committeeMention})` : ''}`)
                : '—';

              const egMention = teamMention(expertGroupId, expertGroup);
              const egStr = expertGroup
                ? (expertGroup.url
                    ? `[${expertGroup.label}](${expertGroup.url})${egMention ? ` (${egMention})` : ''}`
                    : `${expertGroup.label}${egMention ? ` (${egMention})` : ''}`)
                : '—';

              return `| ${stdLink} | ${committeeStr} | ${egStr} |`;
            }

            // ── 5. Build the comment body ────────────────────────────────────────
            const changedCxId = `CX-${changedNode.number}`;
            const changedTitle = changedNode.title ?? '';

            let body = `## 🔔 Change Request – Dependency Notification\n\n`;
            body += `A change request has been opened for **${changedCxId}: ${changedTitle}**.\n\n`;
            body += `The tables below list all standards that are connected to this standard `;
            body += `via the [Catena-X Standards Graph](https://catenax-ev.github.io). `;
            body += `Owners of these standards should review the proposed change and assess `;
            body += `any potential impact on their own standards.\n\n`;
            body += `> **Please get in contact with the Standard Owner or inform yourself `;
            body += `during the related meetings (e.g. internal Planning).**\n\n`;

            const tableHeader = `| Standard | Committee | Expert Group |\n| --- | --- | --- |`;

            // Standards that DEPEND ON the changed standard (most relevant)
            if (dependentIds.size > 0) {
              body += `### Standards that reference / depend on ${changedCxId}\n\n`;
              body += `These standards directly reference **${changedCxId}** and may be impacted by the proposed change.\n\n`;
              body += tableHeader + '\n';
              for (const id of [...dependentIds].sort()) {
                const row = formatRow(id);
                if (row) body += row + '\n';
              }
              body += '\n';
            }

            // Standards the changed standard depends on
            if (dependsOnIds.size > 0) {
              body += `### Standards that ${changedCxId} depends on\n\n`;
              body += `The proposed change to **${changedCxId}** may affect these referenced standards.\n\n`;
              body += tableHeader + '\n';
              for (const id of [...dependsOnIds].sort()) {
                const row = formatRow(id);
                if (row) body += row + '\n';
              }
              body += '\n';
            }

            if (dependentIds.size === 0 && dependsOnIds.size === 0) {
              body += `_No dependency relationships found for ${changedCxId} in the standards graph._\n\n`;
            }

            body += `---\n`;
            body += `*This comment was generated automatically by the [Change Request – Dependency Notification]`;
            body += `(${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/change-request-notify.yml) workflow.*`;

            // ── 6. Post the comment ──────────────────────────────────────────────
            await github.rest.issues.createComment({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              issue_number: context.payload.issue.number,
              body,
            });

            console.log(`Comment posted on issue #${context.payload.issue.number}`);
